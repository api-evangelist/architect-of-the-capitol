        type: tools.type
        limit: tools.limit
        offset: tools.offset
      inputParameters:
      - name: type
        type: string
        description: type
      - name: limit
        type: integer
        description: limit
      - name: offset
        type: integer
        description: offset
      outputParameters:
      - type: object
        mapping: $.
    - name: getbuilding
