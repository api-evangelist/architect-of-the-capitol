      - name: location
        type: string
        description: location
      - name: limit
        type: integer
        description: limit
      - name: offset
        type: integer
        description: offset
      outputParameters:
      - type: object
        mapping: $.
    - name: getartwork
      description: Get artwork details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: architect-of-the-capitol.getartwork
      with:
        artworkId: tools.artworkId
      inputParameters:
      - name: artworkId
        type: string
        description: artworkId
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: listpreservationprojects
      description: List historic preservation projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: architect-of-the-capitol.listpreservationprojects
      with:
        status: tools.status
        buildingId: tools.buildingId
        limit: tools.limit
