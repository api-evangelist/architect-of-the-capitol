naftiko: 1.0.0-alpha2
info:
  label: Architect of the Capitol Data API — Buildings
  description: 'Architect of the Capitol Data API — Buildings. 2 operations. Lead operation: List Capitol campus buildings.
    Self-contained Naftiko capability covering one Architect Of The Capitol business surface.'
  tags:
  - Architect Of The Capitol
  - Buildings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARCHITECT_OF_THE_CAPITOL_API_KEY: ARCHITECT_OF_THE_CAPITOL_API_KEY
capability:
  consumes:
  - type: http
    namespace: aoc-data-buildings
    baseUri: https://api.aoc.gov/v1
    description: Architect of the Capitol Data API — Buildings business capability. Self-contained, no shared references.
    resources:
    - name: buildings
      path: /buildings
      operations:
      - name: listbuildings
        method: GET
        description: List Capitol campus buildings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    - name: buildings-buildingId
      path: /buildings/{buildingId}
      operations:
      - name: getbuilding
        method: GET
        description: Get building details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: buildingId
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: aoc-data-buildings-rest
    port: 8080
    description: REST adapter for Architect of the Capitol Data API — Buildings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/buildings
      name: buildings
      description: REST surface for buildings.
      operations:
      - method: GET
        name: listbuildings
        description: List Capitol campus buildings
        call: aoc-data-buildings.listbuildings
        with:
          type: rest.type
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/buildings/{buildingid}
      name: buildings-buildingid
      description: REST surface for buildings-buildingId.
      operations:
      - method: GET
        name: getbuilding
        description: Get building details
        call: aoc-data-buildings.getbuilding
        with:
          buildingId: rest.buildingId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: aoc-data-buildings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Architect of the Capitol Data API — Buildings. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-capitol-campus-buildings
      description: List Capitol campus buildings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aoc-data-buildings.listbuildings
      with:
        type: tools.type
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: get-building-details
      description: Get building details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aoc-data-buildings.getbuilding
      with:
        buildingId: tools.buildingId
      outputParameters:
      - type: object
        mapping: $.
