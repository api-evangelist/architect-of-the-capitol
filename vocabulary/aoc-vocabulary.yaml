vocabulary:
  name: Architect of the Capitol Vocabulary
  description: Operational vocabulary for the Architect of the Capitol Data API
  resources:
    - name: Building
      description: A physical structure on the Capitol campus including the Capitol, office buildings, and courts
    - name: Artwork
      description: A piece of art in the Capitol collection including paintings, sculptures, and historic artifacts
    - name: PreservationProject
      description: A historic preservation or restoration project on the Capitol campus
    - name: VisitorInfo
      description: Visitor information including hours, tours, and access details
    - name: AccessibilityInfo
      description: Accessibility features and accommodations for Capitol campus buildings
  actions:
    - name: List
      description: Retrieve a paginated collection of resources
    - name: Get
      description: Retrieve a single resource by identifier
  personas:
    - name: Researcher
      description: Academic or historical researcher studying the Capitol campus and collections
    - name: Visitor
      description: Member of the public seeking visitor information and campus access details
    - name: Congressional Staff
      description: Staff member supporting congressional operations and facilities needs
  dimensions:
    - name: Historic Significance
      description: Cultural and historic importance of Capitol buildings and art
    - name: Public Access
      description: Open access to government facilities and collections data
    - name: Preservation
      description: Conservation and restoration of historic structures and artifacts
