aid: architect-of-the-capitol
name: Architect of the Capitol
description: The Architect of the Capitol (AOC) serves Congress and the Supreme Court as builder and steward of Capitol Hill's landmark buildings and grounds, preserving historic structures, 
  monuments, art, and gardens across the Capitol campus.
